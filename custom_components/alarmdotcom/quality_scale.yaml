rules:
  # Bronze
  action-setup: done
  appropriate-polling:
    status: done
    comment: >
      WebSocket push is the primary update mechanism; a 5-minute full-state
      poll runs as a safety net for missed events only.
  brands: done
  common-modules:
    status: todo
    comment: >
      Uses a custom AlarmHub class rather than DataUpdateCoordinator.
      Refactoring would be needed to adopt the common coordinator pattern.
  config-flow: done
  config-flow-test-coverage: todo
  dependency-transparency: done
  docs-actions: todo
  docs-high-level-description: todo
  docs-installation-instructions: todo
  docs-removal-instructions: todo
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data:
    status: todo
    comment: >
      Hub and camera session are stored in hass.data[DOMAIN][entry_id]
      instead of config_entry.runtime_data.
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: todo
    comment: >
      alarm_control_panel raises ServiceValidationError correctly, but the
      bypass/unbypass service handlers in __init__.py only log a warning
      and return instead of raising ServiceValidationError.
  config-entry-unloading: done
  docs-configuration-parameters: todo
  docs-installation-parameters: todo
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates:
    status: todo
    comment: >
      No PARALLEL_UPDATES constant defined in platform files.
      Push-based integrations should set PARALLEL_UPDATES = 0.
  reauthentication-flow: done
  test-coverage: todo

  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info:
    status: exempt
    comment: >
      Not applicable — discovery is exempt since Alarm.com is a cloud service
      with no local network presence to rediscover.
  discovery:
    status: exempt
    comment: >
      Alarm.com devices, to my knowledge, do not exist on any local network. So they cannot be discovered.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: done
    comment: >
      Entities self-remove on RESOURCE_DELETED events. Binary sensors
      handle RESOURCE_ADDED for runtime additions. cleanup_orphaned_entities_and_devices
      in util.py removes stale entities and devices on each setup.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: todo
  entity-translations:
    status: todo
    comment: >
      Entity names are hardcoded strings; no translation_key is set on
      entity descriptions. Only the OTP selector in config_flow uses
      translation_key.
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues: todo
  stale-devices:
    status: done
    comment: >
      cleanup_orphaned_entities_and_devices in util.py removes devices
      with no remaining entities on each platform setup.

  # Platinum
  async-dependency:
    status: done
    comment: >
      pyalarmdotcomajax is fully async and aiohttp-based.
  inject-websession:
    status: todo
    comment: >
      AlarmBridge creates its own aiohttp session rather than accepting
      one injected via async_get_clientsession from HA.
  strict-typing:
    status: todo
    comment: >
      mypy is configured with many strict options (disallow_untyped_defs,
      strict_equality, etc.) but not full strict mode — disallow_untyped_calls
      is false and tests are excluded from type checking.
